const RIVAL_META = { /* ... le 6 squadre ... */ };

// --- LOGICA DEL GIOCO ---
const FORM_SLOTS = {
  '321': [{id:'GK',lab:'POR',grp:'GK',row:0},{id:'TS',lab:'TS',grp:'DEF',row:1,dy:-8},{id:'DC',lab:'DC',grp:'DEF',row:1,dy:8},{id:'TD',lab:'TD',grp:'DEF',row:1,dy:-8},{id:'CC1',lab:'CC',grp:'MID',row:2,dy:-8},{id:'CC2',lab:'CC',grp:'MID',row:2,dy:8},{id:'ATT',lab:'ATT',grp:'ATT',row:3,dy:0}],
  '231': [{id:'GK',lab:'POR',grp:'GK',row:0},{id:'DCS',lab:'DCS',grp:'DEF',row:1,dy:0},{id:'DCD',lab:'DCD',grp:'DEF',row:1,dy:0},{id:'ES',lab:'ES',grp:'MID',row:2,dy:-8},{id:'CC',lab:'CC',grp:'MID',row:2,dy:8},{id:'ED',lab:'ED',grp:'MID',row:2,dy:-8},{id:'ATT',lab:'ATT',grp:'ATT',row:3,dy:0}],
  '222': [{id:'GK',lab:'POR',grp:'GK',row:0},{id:'DCS',lab:'DCS',grp:'DEF',row:1,dy:0},{id:'DCD',lab:'DCD',grp:'DEF',row:1,dy:0},{id:'CS',lab:'CS',grp:'MID',row:2,dy:0},{id:'CD',lab:'CD',grp:'MID',row:2,dy:0},{id:'ATTS',lab:'ATT',grp:'ATT',row:3,dy:0},{id:'ATTD',lab:'ATTD',grp:'ATT',row:3,dy:0}]
};

const POS_INFO = { POR: {grp:'GK'}, DIF: {grp:'DEF'}, CC: {grp:'MID'}, ATT: {grp:'ATT'} };
const GRP_ORDER=['GK','DEF','MID','ATT'];
const GRP_NAME={GK:'Portieri',DEF:'Difensori',MID:'Centrocampisti',ATT:'Attaccanti'};

// --- SIMULAZIONE CAMPIONATO A 7 ---
function simulate() {
  const r = computeRatings(), myAtk = r.attack, myDef = r.defense;
  let matches = [];
  const used = new Set();
  let pts = 0, gGF = 0, gGA = 0;
  
  // 6 Giornate: affronti le 6 squadre del database
  for(let i = 0; i < 6; i++) {
    const rival = pickRivalByPond(80, used);
    if (!rival) break;
    used.add(rival.key);
    
    const m = playMatch(myAtk, myDef, rival.pond, false);
    gGF += m.gFor; gGA += m.gAg;
    
    if(m.adv === true) pts += 3;
    else if(m.adv === null) pts += 1;
    
    matches.push({
      phase: 'Giornata ' + (i + 1),
      rival: rival.team,
      gf: m.gFor, ga: m.gAg,
      outcome: m.adv === true ? 'win' : (m.adv === false ? 'lost' : 'draw'),
      advanced: true
    });
  }

  showResults({
    gf: gGF, ga: gGA, matches, champion: (pts >= 14), overall: r.overall,
    group: { pts, pos: pts >= 15 ? 1 : (pts >= 12 ? 2 : 4), classified: true },
    koWins: 0
  });
}
